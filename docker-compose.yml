version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tictactoe-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nakama_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - tictactoe-network

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: tictactoe-nakama
    volumes:
      - ./nakama/data:/nakama/data
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:${POSTGRES_PASSWORD:-nakama_password}@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/nakama-config.yml --database.address postgres:${POSTGRES_PASSWORD:-nakama_password}@postgres:5432/nakama
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349" # gRPC API
      - "7350:7350" # HTTP API
      - "7351:7351" # Console
    environment:
      - NAKAMA_NAME=tictactoe-nakama
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:7350/"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    networks:
      - tictactoe-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_NAKAMA_HOST=${NAKAMA_HOST:-localhost}
        - VITE_NAKAMA_PORT=${NAKAMA_PORT:-7350}
        - VITE_NAKAMA_SSL=${NAKAMA_SSL:-false}
    container_name: tictactoe-frontend
    ports:
      - "80:80"
    depends_on:
      - nakama
    networks:
      - tictactoe-network

volumes:
  postgres_data:

networks:
  tictactoe-network:
    driver: bridge
