name: tictactoe-nakama
runtime:
  js_entrypoint: "build/index.js"

logger:
  level: "INFO"

console:
  port: 7351
  username: "admin"
  password: "password"
  signing_key: "defaultsigningkey"
  token_expiry_sec: 86400

socket:
  server_key: "defaultserverkey"
  port: 7350
  max_message_size_bytes: 4096
  read_buffer_size_bytes: 4096
  write_buffer_size_bytes: 4096
  write_wait_ms: 5000
  ping_period_ms: 10000
  pong_wait_ms: 15000
  max_request_size_bytes: 262144

session:
  token_expiry_sec: 86400
  refresh_token_expiry_sec: 604800

leaderboard:
  callback_queue_size: 65536
  callback_queue_workers: 8

match:
  call_queue_size: 65536
  join_attempt_queue_size: 1024
  join_marker_deadline_ms: 15000
  max_empty_sec: 60
  input_queue_size: 128
  signal_queue_size: 16

matchmaker:
  max_tickets: 1000
  interval_sec: 5
  max_intervals: 6
